<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Compras — Varejo</title>
<style>
  :root{
    --ink:#1a1410;--paper:#faf6ef;--card:#fffdf9;--gold:#c9992e;--gold-soft:#f0e4c2;
    --brick:#b5462f;--forest:#3f6b4c;--plum:#6b3f5f;--sky:#3a6b8a;--line:#e4dbc9;
    --shadow:0 8px 30px rgba(60,40,10,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;
    background:radial-gradient(circle at 15% 10%,#fff6e0 0,transparent 40%),
      radial-gradient(circle at 85% 90%,#fdeee6 0,transparent 45%),var(--paper);
    color:var(--ink);min-height:100vh;padding:12px 16px 16px;}
  .wrap{max-width:1320px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:14px 20px;flex-wrap:wrap;margin-bottom:9px}
  .brand-logo{height:42px;display:block;filter:drop-shadow(0 3px 8px rgba(60,40,10,.12))}
  .title-block{margin-right:auto}
  .kicker{letter-spacing:.28em;font-size:.6rem;text-transform:uppercase;color:var(--gold);font-weight:700}
  .title-block h1{font-family:Georgia,serif;font-size:clamp(1.3rem,2.4vw,1.8rem);font-weight:800;line-height:1.05;
    background:linear-gradient(120deg,var(--brick),var(--gold) 60%,var(--plum));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .yearbar{display:flex;align-items:center;gap:8px}
  .syncbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .yearbar button.nav{background:var(--card);border:1.5px solid var(--line);border-radius:50%;
    width:34px;height:34px;font-size:1.1rem;cursor:pointer;color:var(--brick);box-shadow:var(--shadow);transition:.2s}
  .yearbar button.nav:hover{transform:scale(1.1);border-color:var(--gold)}
  .yearbar .yr{font-family:Georgia,serif;font-size:1.5rem;font-weight:800;min-width:78px;text-align:center}
  .syncbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sync{font-size:.76rem;font-weight:600;padding:5px 12px;border-radius:20px;background:#eee;color:#666}
  .sync.ok{background:#e4f2e7;color:#2f6b40}
  .sync.warn{background:#fdf0d8;color:#8a6a1a}
  .sync.sync-load{background:#e6eef6;color:#2f5a7b}
  .reload{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:5px 14px;
    font-size:.76rem;font-weight:600;cursor:pointer;color:var(--brick);font-family:inherit;transition:.2s}
  .reload:hover{border-color:var(--gold);background:#fffdf6}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .month{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
  .month:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(60,40,10,.16)}
  .month.active{outline:2.5px solid var(--gold);outline-offset:1px}
  .m-head{padding:7px 12px 6px;color:#fff;position:relative;overflow:hidden;display:flex;align-items:center;gap:9px}
  .m-head::after{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,rgba(255,255,255,.06) 0 10px,transparent 10px 20px);pointer-events:none}
  .m-emoji{font-size:1.5rem;line-height:1;display:inline-block;animation:float 4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-4deg)}}
  .m-head h2{font-family:Georgia,serif;font-size:1.12rem;position:relative;z-index:1;line-height:1}
  .m-head .season{display:none}
  .m-stats{display:flex;gap:5px;padding:6px 10px;border-bottom:1px solid var(--line);
    background:linear-gradient(var(--card),#fdf9f0)}
  .stat{flex:1;text-align:center;padding:3px 2px;border-radius:9px;background:var(--paper)}
  .stat .n{font-family:Georgia,serif;font-size:1.05rem;font-weight:800;line-height:1}
  .stat .l{font-size:.5rem;text-transform:uppercase;letter-spacing:.03em;color:#8a7c66;margin-top:2px}
  .stat.uteis .n{color:var(--forest)}.stat.fds .n{color:var(--sky)}.stat.fer .n{color:var(--brick)}
  .alerts{padding:7px 9px 0}
  .alert{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fff4d6,#ffe8c2);
    border:1.5px solid #e8c46a;border-radius:10px;padding:5px 8px;margin-bottom:5px;cursor:pointer;
    transition:.2s;box-shadow:0 2px 8px rgba(200,150,40,.14)}
  .alert:hover{border-color:var(--gold);transform:translateX(2px)}
  .alert .bell{font-size:.95rem;flex-shrink:0;animation:ring 2.2s ease-in-out infinite;transform-origin:top center}
  @keyframes ring{0%,60%,100%{transform:rotate(0)}70%{transform:rotate(14deg)}80%{transform:rotate(-12deg)}90%{transform:rotate(8deg)}}
  .alert-txt{flex:1;font-size:.68rem;line-height:1.15;min-width:0}
  .alert-txt strong{color:#7a5c14}
  .alert-txt .sub{font-size:.58rem;color:#9a7c34;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .alert .go{font-size:.85rem;color:var(--gold);flex-shrink:0}
  .alert .badge{background:var(--brick);color:#fff;font-size:.56rem;font-weight:700;border-radius:20px;
    padding:1px 6px;flex-shrink:0}
  .campaigns{padding:7px 10px 9px;flex:1;display:flex;flex-direction:column}
  .camp-title{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700;
    margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .camp{display:flex;gap:8px;padding:6px 8px;border-radius:10px;margin-bottom:5px;align-items:center;
    background:var(--paper);border:1px solid var(--line);transition:.2s;cursor:pointer;position:relative}
  .camp:hover{border-color:var(--gold);background:#fffdf6}
  .camp-ico{font-size:1.15rem;flex-shrink:0;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:transform .3s}
  .camp:hover .camp-ico{transform:rotate(-8deg) scale(1.08)}
  .camp-body{flex:1;min-width:0}
  .camp-name{font-weight:700;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .camp-when{display:none}
  .camp-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;align-items:center}
  .buy-tag{display:inline-flex;align-items:center;gap:3px;font-size:.56rem;font-weight:700;padding:2px 6px;
    border-radius:20px;background:var(--gold-soft);color:#7a5c14;border:1px solid transparent;
    white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .buy-tag.empty{background:#f3ece0;color:#a0917a}
  .prod-count{font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:20px;background:#e8f0e9;color:var(--forest)}
  .camp-actions{display:flex;gap:3px;flex-shrink:0;align-self:center;
    opacity:0;transition:opacity .15s;pointer-events:none}
  .camp:hover .camp-actions{opacity:1;pointer-events:auto}
  .icon-btn{background:#fff;border:1px solid var(--line);border-radius:8px;width:24px;height:24px;
    display:grid;place-items:center;cursor:pointer;font-size:.72rem;transition:.15s;padding:0}
  .icon-btn:hover{border-color:var(--gold);background:#fffdf6}
  .icon-btn.del:hover{border-color:var(--brick);background:#fdeee9}
  /* em telas de toque (sem hover), os botões ficam sempre visíveis */
  @media (hover:none){.camp-actions{opacity:1;pointer-events:auto}}
  .add-camp-btn{background:var(--forest);color:#fff;border:none;border-radius:8px;padding:3px 8px;
    cursor:pointer;font-size:.6rem;font-weight:700;font-family:inherit;transition:.2s;letter-spacing:.02em}
  .add-camp-btn:hover{background:#345c40}
  .empty-camps{font-size:.68rem;color:#a0917a;text-align:center;padding:8px 6px;font-style:italic}
  /* modal genérico */
  .modal-bg{position:fixed;inset:0;background:rgba(30,20,10,.5);display:none;place-items:center;z-index:50;
    padding:20px;backdrop-filter:blur(3px)}
  .modal-bg.on{display:grid}
  .modal{background:var(--card);border-radius:20px;padding:24px;max-width:420px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pop .25s ease}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .modal h3{font-family:Georgia,serif;font-size:1.3rem;margin-bottom:4px}
  .modal p.sub{color:#8a7c66;font-size:.85rem;margin-bottom:16px}
  .modal label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#8a7c66;
    font-weight:700;margin:12px 0 5px}
  .modal input[type=text]{width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 12px;
    font-size:.92rem;background:var(--paper);font-family:inherit}
  .modal input:focus{outline:none;border-color:var(--gold)}
  .emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .emoji-row button{width:40px;height:40px;border:1.5px solid var(--line);border-radius:10px;background:var(--paper);
    font-size:1.3rem;cursor:pointer;transition:.15s}
  .emoji-row button:hover{border-color:var(--gold)}
  .emoji-row button.sel{border-color:var(--gold);background:var(--gold-soft)}
  .mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .mo-grid button{padding:10px 4px;border:1.5px solid var(--line);border-radius:11px;background:var(--paper);
    cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:.15s}
  .mo-grid button:hover{border-color:var(--gold);background:#fffdf6}
  .mo-grid button.sel{background:var(--gold);color:#fff;border-color:var(--gold)}
  .modal-actions{display:flex;gap:8px;margin-top:20px}
  .btn{flex:1;padding:11px;border:none;border-radius:11px;cursor:pointer;font-weight:700;font-family:inherit;font-size:.9rem;transition:.2s}
  .btn.primary{background:var(--ink);color:#fff}.btn.primary:hover{background:#000}
  .btn.ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line)}.btn.ghost:hover{border-color:var(--gold)}
  .btn.danger{background:var(--brick);color:#fff}.btn.danger:hover{background:#933a26}
  /* modal grande de produtos */
  .big{max-width:560px}
  .big-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .big-emoji{font-size:2.6rem;width:64px;height:64px;border-radius:16px;display:grid;place-items:center;
    box-shadow:0 4px 14px rgba(0,0,0,.12)}
  .big-head h3{font-size:1.6rem}
  .big-when{font-size:.82rem;color:#8a7c66}
  .big-buy{margin:14px 0 6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 14px;background:var(--paper);border:1px solid var(--line);border-radius:14px}
  .big-buy .lbl{font-size:.78rem;color:#6b5d48;font-weight:600}
  .big-buy button{background:var(--gold-soft);border:1px solid transparent;color:#7a5c14;font-weight:700;
    padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:.15s}
  .big-buy button:hover{border-color:var(--gold)}
  .big-list{margin-top:14px;max-height:44vh;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding-right:4px}
  .prod{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;font-size:.95rem;animation:pop .25s ease}
  .prod .chk{color:var(--forest);cursor:pointer;font-size:1.15rem}
  .prod .txt{flex:1}
  .prod .del{color:#b5462f;opacity:.45;cursor:pointer;font-weight:700;padding:0 4px;font-size:1.1rem}
  .prod .del:hover{opacity:1}
  .big-empty{text-align:center;color:#a0917a;font-style:italic;padding:24px 8px;font-size:.9rem}
  .big-add{display:flex;gap:8px;margin-top:14px}
  .big-add input{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:.92rem;
    background:var(--paper);font-family:inherit}
  .big-add input:focus{outline:none;border-color:var(--gold)}
  .big-add button{background:var(--forest);color:#fff;border:none;border-radius:12px;padding:0 18px;
    cursor:pointer;font-size:1.3rem;transition:.2s}
  .big-add button:hover{background:#345c40}
  .big-progress{font-size:.74rem;color:#8a7c66;margin-top:10px;text-align:center}
  footer{text-align:center;margin-top:40px;color:#9b8d76;font-size:.8rem}
  .reset{background:none;border:1px solid var(--line);color:#9b8d76;border-radius:20px;padding:6px 16px;
    cursor:pointer;font-size:.78rem;margin-top:10px;font-family:inherit}
  .reset:hover{border-color:var(--brick);color:var(--brick)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

  7:[{i:"👨",n:"Dia dos Pais",w:"2º domingo · presentes"},{i:"🐾",n:"Semana do Cliente",w:"Fidelização"}],
  8:[{i:"🛒",n:"Semana do Cliente",w:"Meados de setembro"},{i:"🌸",n:"Primavera",w:"Decoração, renovação"}],
  9:[{i:"🧒",n:"Dia das Crianças",w:"12/10 · brinquedos, presentes"},{i:"🎃",n:"Halloween",w:"Decoração temática"}],
  10:[{i:"🖤",n:"Black Friday",w:"Última sexta · a maior data"},{i:"📦",n:"Cyber Monday",w:"Segunda seguinte"}],
  11:[{i:"🎄",n:"Natal",w:"A maior data do varejo"},{i:"🎆",n:"Réveillon",w:"Branco, decoração, bebidas"}]
};
const FERIADOS={0:[1],3:[21],4:[1],8:[7],9:[12],10:[2,15,20],11:[25]};

let YEAR=2026;
const CKEY="calendario_compras_v2";
// ===== CONFIGURAÇÃO DA NUVEM =====
// Cole aqui a URL do seu Web App do Google Apps Script (termina em /exec)
const CLOUD_URL="https://script.google.com/macros/s/AKfycbzOzQ-x58bjYfKknGrw0AZ0BbXkawuIB0qB7Wrk3UvSJn2fjiiYebZYUkK-pYTc_fFLtA/exec";
// =================================
// state: {campanhas:{m:[{id,i,n,w}]}, dados:{campId:{buyMonth,products:[]}}}
let state=null;
let cloudReady=false;

function initDefault(){
  const camp={};let counter=1;
  for(let m=0;m<12;m++){camp[m]=(DEFAULT_CAMPANHAS[m]||[]).map(c=>({id:"c"+(counter++),i:c.i,n:c.n,w:c.w}))}
  return {campanhas:camp,dados:{}};
}

function cloudOn(){return CLOUD_URL && CLOUD_URL.indexOf("COLE_AQUI")===-1}

function setStatus(txt,cls){
  const el=document.getElementById("syncStatus");if(!el)return;
  el.textContent=txt;el.className="sync "+(cls||"");
}

// carrega o estado da nuvem ao abrir
async function loadState(){
  const cached=localStorage.getItem(CKEY);
  const cachedState = cached ? safeParse(cached) : null;
  if(!cloudOn()){
    state=cachedState||initDefault();
    setStatus("Modo local (nuvem não configurada)","warn");
    return;
  }
  setStatus("Carregando da nuvem…","sync-load");
  try{
    const ctrl=new AbortController();
    const to=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(CLOUD_URL+"?action=get",{method:"GET",signal:ctrl.signal});
    clearTimeout(to);
    const txt=await r.text();
    const j=safeParse(txt);
    if(j&&j.state&&j.state.campanhas){
      // nuvem tem dados válidos -> usa
      state=j.state;
      setStatus("✓ Sincronizado","ok");
    }else if(cachedState&&cachedState.campanhas){
      // nuvem vazia/ilegível MAS existe cache local -> preserva local e reenvia
      state=cachedState;
      setStatus("✓ Sincronizado (local)","ok");
      pushNow();
    }else{
      // realmente primeira vez, nada em lugar nenhum -> padrão
      state=initDefault();
      setStatus("✓ Sincronizado","ok");
      pushNow();
    }
    cloudReady=true;
    localStorage.setItem(CKEY,JSON.stringify(state));
  }catch(e){
    console.error(e);
    state=cachedState||initDefault();
    setStatus("⚠ Sem conexão — usando cópia local","warn");
  }
}
function safeParse(s){try{return JSON.parse(s);}catch(_){return null;}}

// envia o estado atual para a nuvem
async function pushNow(){
  localStorage.setItem(CKEY,JSON.stringify(state));
  if(!cloudOn())return;
  setStatus("Salvando…","sync-load");
  try{
    // Apps Script responde POST com redirect p/ googleusercontent; no-cors evita
    // o bloqueio de CORS e garante que a gravação chegue ao servidor.
    await fetch(CLOUD_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"save",state})
    });
    // com no-cors a resposta é opaca (não dá para ler), mas o POST foi entregue
    setStatus("✓ Salvo na nuvem","ok");
  }catch(e){
    console.error(e);
    setStatus("⚠ Falha ao salvar — cópia local guardada","warn");
  }
}

// salva com debounce (agrupa várias edições seguidas)
let saveTimer=null;
function saveState(){
  localStorage.setItem(CKEY,JSON.stringify(state));
  if(!cloudOn())return;
  setStatus("Salvando…","sync-load");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushNow,700);
}
function dado(id){if(!state.dados[id])state.dados[id]={buyMonth:null,products:[]};return state.dados[id]}

function pascoa(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
  l=(32+2*e+2*i-h-k)%7,mm=Math.floor((a+11*h+22*l)/451),mes=Math.floor((h+l-7*mm+114)/31),
  dia=((h+l-7*mm+114)%31)+1;return new Date(y,mes-1,dia);}
function feriadosMoveis(y){const p=pascoa(y),out={};
  const add=dt=>{const m=dt.getMonth();(out[m]=out[m]||[]).push(dt.getDate())};
  add(new Date(p.getTime()-47*864e5));add(new Date(p.getTime()-2*864e5));add(new Date(p.getTime()+60*864e5));
  return out;}
function contarDias(y,m){const total=new Date(y,m+1,0).getDate();const mov=feriadosMoveis(y);
  const fset=new Set([...(FERIADOS[m]||[]),...(mov[m]||[])]);let uteis=0,fds=0;
  for(let d=1;d<=total;d++){const dow=new Date(y,m,d).getDay();const fim=dow===0||dow===6;
    if(fim)fds++;else if(!fset.has(d))uteis++;}
  const fu=[...fset].filter(d=>{const dow=new Date(y,m,d).getDay();return dow!==0&&dow!==6}).length;
  return {uteis,fds,feriados:fu};}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function alertasDoMes(mesAlvo){
  // retorna campanhas (de qualquer mês) cujo buyMonth === mesAlvo
  const out=[];
  for(let m=0;m<12;m++){
    (state.campanhas[m]||[]).forEach(cp=>{
      const d=state.dados[cp.id];
      if(d&&d.buyMonth===mesAlvo){
        const pend=(d.products||[]).filter(p=>!p.done).length;
        out.push({cp,origem:m,pend,total:(d.products||[]).length});
      }
    });
  }
  return out;
}

function render(){
  document.getElementById("yrLabel").textContent=YEAR;
  const grid=document.getElementById("grid");grid.innerHTML="";
  for(let m=0;m<12;m++){
    const st=contarDias(YEAR,m);const [c1,c2]=CORES[m];const camps=state.campanhas[m]||[];
    const card=document.createElement("div");card.className="month";

    // avisos: campanhas cujas compras devem ser feitas NESTE mês
    const avisos=alertasDoMes(m);
    let alertsHTML="";
    if(avisos.length){
      alertsHTML=`<div class="alerts">`+avisos.map(a=>{
        const sub=a.total>0?`${a.pend} item(ns) pendente(s) de ${a.total}`:`Lista de compras vazia`;
        const badge=a.pend>0?`<span class="badge">${a.pend}</span>`:"";
        return `<div class="alert" data-act="open" data-id="${a.cp.id}" data-m="${a.origem}">
          <span class="bell">🔔</span>
          <div class="alert-txt"><strong>Comprar: ${escapeHtml(a.cp.n)}</strong>
            <div class="sub">Campanha de ${MESES[a.origem]} · ${sub}</div></div>
          ${badge}<span class="go">›</span></div>`;
      }).join("")+`</div>`;
    }

    let campsHTML="";
    if(camps.length===0){campsHTML=`<div class="empty-camps">Nenhuma campanha ainda.<br>Clique em “+ Campanha”.</div>`}
    camps.forEach(cp=>{
      const d=state.dados[cp.id]||{buyMonth:null,products:[]};
      const buyLabel=(d.buyMonth!=null)?`🛒 Comprar em ${MESES_CURT[d.buyMonth]}`:`＋ Definir compra`;
      const buyCls=(d.buyMonth!=null)?"":"empty";
      const pc=(d.products||[]).length;
      const done=(d.products||[]).filter(p=>p.done).length;
      const countHTML=pc>0?`<span class="prod-count">🛍️ ${done}/${pc}</span>`:"";
      campsHTML+=`
      <div class="camp" data-act="open" data-id="${cp.id}" data-m="${m}">
        <div class="camp-ico">${cp.i}</div>
        <div class="camp-body">
          <div class="camp-name">${escapeHtml(cp.n)}</div>
          <div class="camp-when">${escapeHtml(cp.w)}</div>
          <div class="camp-meta">
            <span class="buy-tag ${buyCls}">${buyLabel}</span>${countHTML}
          </div>
        </div>
        <div class="camp-actions">
          <button class="icon-btn" data-act="edit" data-id="${cp.id}" data-m="${m}" title="Editar">✏️</button>
          <button class="icon-btn del" data-act="delcamp" data-id="${cp.id}" data-m="${m}" title="Excluir">🗑️</button>
        </div>
      </div>`;
    });
    card.innerHTML=`
      <div class="m-head" style="background:linear-gradient(135deg,${c1},${c2})">
        <span class="m-emoji">${(camps[0]||{}).i||"📅"}</span>
        <div class="season">${YEAR}</div><h2>${MESES[m]}</h2>
      </div>
      <div class="m-stats">
        <div class="stat uteis"><div class="n">${st.uteis}</div><div class="l">Dias úteis</div></div>
        <div class="stat fds"><div class="n">${st.fds}</div><div class="l">Fins de semana</div></div>
        <div class="stat fer"><div class="n">${st.feriados}</div><div class="l">Feriados</div></div>
      </div>
      ${alertsHTML}
      <div class="campaigns">
        <div class="camp-title"><span>Campanhas do mês</span>
          <button class="add-camp-btn" data-act="addcamp" data-m="${m}">＋ Campanha</button></div>
        ${campsHTML}
      </div>`;
    grid.appendChild(card);
  }
}

// ------- eventos grid -------
document.getElementById("grid").addEventListener("click",e=>{
  const btn=e.target.closest("[data-act]");if(!btn)return;
  const act=btn.dataset.act,m=+btn.dataset.m,id=btn.dataset.id;
  if(act==="addcamp"){openCampModal(m,null);return;}
  if(act==="edit"){e.stopPropagation();openCampModal(m,id);return;}
  if(act==="delcamp"){e.stopPropagation();delCamp(m,id);return;}
  if(act==="open"){openProdModal(id,m);}
});

// ------- campanha add/edit -------
let editCtx={m:null,id:null,emoji:"🛒"};
function openCampModal(m,id){
  editCtx.m=m;editCtx.id=id;
  const isEdit=!!id;
  let cp={i:"🛒",n:"",w:""};
  if(isEdit)cp=state.campanhas[m].find(c=>c.id===id)||cp;
  editCtx.emoji=cp.i;
  document.getElementById("campModalTitle").textContent=isEdit?"Editar campanha":"Nova campanha";
  document.getElementById("campModalSub").textContent=`${MESES[m]} · ${YEAR}`;
  document.getElementById("campName").value=cp.n;
  document.getElementById("campWhen").value=cp.w;
  const row=document.getElementById("emojiRow");row.innerHTML="";
  EMOJIS.forEach(em=>{const b=document.createElement("button");b.textContent=em;
    if(em===cp.i)b.className="sel";
    b.onclick=()=>{editCtx.emoji=em;[...row.children].forEach(x=>x.className="");b.className="sel"};
    row.appendChild(b);});
  document.getElementById("campModalBg").classList.add("on");
  setTimeout(()=>document.getElementById("campName").focus(),80);
}
function closeCampModal(){document.getElementById("campModalBg").classList.remove("on")}
document.getElementById("campCancel").onclick=closeCampModal;
document.getElementById("campModalBg").onclick=e=>{if(e.target.id==="campModalBg")closeCampModal()};
document.getElementById("campSave").onclick=()=>{
  const n=document.getElementById("campName").value.trim();
  const w=document.getElementById("campWhen").value.trim();
  if(!n){alert("Dê um nome à campanha.");return;}
  const {m,id}=editCtx;
  if(id){const cp=state.campanhas[m].find(c=>c.id===id);cp.n=n;cp.w=w;cp.i=editCtx.emoji;}
  else{const newId="c"+Date.now();state.campanhas[m].push({id:newId,i:editCtx.emoji,n,w});}
  saveState();render();closeCampModal();
};
function delCamp(m,id){
  const cp=state.campanhas[m].find(c=>c.id===id);
  if(!confirm(`Excluir a campanha “${cp.n}” e todos os seus produtos?`))return;
  state.campanhas[m]=state.campanhas[m].filter(c=>c.id!==id);
  delete state.dados[id];saveState();render();
}

// ------- modal grande de produtos -------
let curProdId=null,curProdM=null;
function openProdModal(id,m){
  curProdId=id;curProdM=m;
  const cp=state.campanhas[m].find(c=>c.id===id);if(!cp)return;
  document.getElementById("bigEmoji").textContent=cp.i;
  document.getElementById("bigEmoji").style.background=`linear-gradient(135deg,${CORES[m][0]},${CORES[m][1]})`;
  document.getElementById("bigTitle").textContent=cp.n;
  document.getElementById("bigWhen").textContent=cp.w||`${MESES[m]} · ${YEAR}`;
  renderProdList();
  document.getElementById("prodModalBg").classList.add("on");
  setTimeout(()=>document.getElementById("bigInput").focus(),80);
}
function renderProdList(){
  const d=dado(curProdId);
  const bb=document.getElementById("bigBuyBtn");
  bb.textContent=(d.buyMonth!=null)?`🛒 ${MESES[d.buyMonth]}`:"Definir mês →";
  bb.onclick=()=>openBuyModal(curProdId);
  const list=document.getElementById("bigList");
  if(!d.products.length){list.innerHTML=`<div class="big-empty">Nenhum produto ainda.<br>Adicione abaixo o que não pode esquecer de comprar.</div>`}
  else{
    list.innerHTML=d.products.map((p,pi)=>`
      <div class="prod">
        <span class="chk" data-pact="toggle" data-pi="${pi}">${p.done?"☑":"☐"}</span>
        <span class="txt" style="${p.done?'text-decoration:line-through;opacity:.5':''}">${escapeHtml(p.name)}</span>
        <span class="del" data-pact="del" data-pi="${pi}">×</span>
      </div>`).join("");
  }
  const done=d.products.filter(p=>p.done).length;
  document.getElementById("bigProgress").textContent=d.products.length?`${done} de ${d.products.length} comprados`:"";
}
document.getElementById("bigList").addEventListener("click",e=>{
  const el=e.target.closest("[data-pact]");if(!el)return;
  const d=dado(curProdId),pi=+el.dataset.pi;
  if(el.dataset.pact==="toggle")d.products[pi].done=!d.products[pi].done;
  if(el.dataset.pact==="del")d.products.splice(pi,1);
  saveState();renderProdList();render();
});
function addProd(){const inp=document.getElementById("bigInput");const v=inp.value.trim();if(!v)return;
  dado(curProdId).products.push({name:v,done:false});inp.value="";saveState();renderProdList();render();
  setTimeout(()=>inp.focus(),30);}
document.getElementById("bigAddBtn").onclick=addProd;
document.getElementById("bigInput").addEventListener("keydown",e=>{if(e.key==="Enter")addProd()});
document.getElementById("prodClose").onclick=()=>document.getElementById("prodModalBg").classList.remove("on");
document.getElementById("prodModalBg").onclick=e=>{if(e.target.id==="prodModalBg")e.currentTarget.classList.remove("on")};

// ------- modal mês de compra -------
let curBuyId=null;
function openBuyModal(id){
  curBuyId=id;const cp=findCamp(id);
  document.getElementById("buySub").textContent=`Campanha: ${cp?cp.n:""}. Escolha o mês para realizar as compras.`;
  const g=document.getElementById("moGrid");g.innerHTML="";
  const cur=dado(id).buyMonth;
  MESES_CURT.forEach((mm,mi)=>{const b=document.createElement("button");b.textContent=mm;
    if(cur===mi)b.className="sel";
    b.onclick=()=>{dado(id).buyMonth=(cur===mi?null:mi);saveState();render();
      document.getElementById("buyModalBg").classList.remove("on");
      if(document.getElementById("prodModalBg").classList.contains("on"))renderProdList();};
    g.appendChild(b);});
  document.getElementById("buyModalBg").classList.add("on");
}
function findCamp(id){for(let m=0;m<12;m++){const c=(state.campanhas[m]||[]).find(x=>x.id===id);if(c)return c;}return null;}
document.getElementById("buyClose").onclick=()=>document.getElementById("buyModalBg").classList.remove("on");
document.getElementById("buyModalBg").onclick=e=>{if(e.target.id==="buyModalBg")e.currentTarget.classList.remove("on")};

document.getElementById("prevY").onclick=()=>{YEAR--;render()};
document.getElementById("nextY").onclick=()=>{YEAR++;render()};
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Restaurar as campanhas padrão e apagar TODOS os produtos e meses de compra salvos?")){
    state=initDefault();saveState();render();}};

document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".modal-bg.on").forEach(x=>x.classList.remove("on"))});

// botão de recarregar da nuvem (puxa alterações feitas em outro PC)
const reloadBtn=document.getElementById("reloadBtn");
if(reloadBtn)reloadBtn.onclick=async()=>{await loadState();render();};

// inicialização: tenta carregar da nuvem, mas SEMPRE desenha a tela
(async()=>{
  try{ await loadState(); }
  catch(e){ console.error(e); }
  if(!state) state=initDefault();  // rede de segurança
  render();
})();
</script>
